<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدیریت شقه - لیسه عالی معرفت افغان</title>

    <!-- SheetJS for Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Tesseract.js for AI OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', sans-serif; background: #f0f2f5; direction: rtl; }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, #1a3c5e, #2e86c1);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-left img { height: 50px; border-radius: 8px; }
        .header-info h2 { font-size: 20px; margin-bottom: 3px; }
        .header-info p { font-size: 12px; opacity: 0.9; }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            font-family: inherit;
        }
        .btn:hover { background: rgba(255,255,255,0.25); }
        .btn-primary { background: #27ae60; }
        .btn-warning { background: #f39c12; color: #000; }
        .btn-danger { background: #e74c3c; }

        /* Tabs */
        .tabs-container {
            background: white;
            margin: 10px 20px;
            border-radius: 8px;
            display: flex;
            overflow-x: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .tab {
            padding: 12px 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
            font-family: inherit;
            color: #555;
        }
        .tab.active { color: #2e86c1; border-bottom-color: #2e86c1; font-weight: bold; }
        .tab:hover { background: #f8f9fa; }

        /* Panels */
        .panel {
            display: none;
            margin: 10px 20px;
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fade 0.3s;
        }
        .panel.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .editable-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .editable-table td, .editable-table th {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: center;
            vertical-align: middle;
        }
        .editable-table th { background: #1a3c5e; color: white; }
        .editable-table td input, .editable-table td textarea {
            width: 100%;
            border: 1px solid transparent;
            padding: 5px;
            text-align: center;
            font-family: inherit;
            font-size: 13px;
            background: transparent;
            transition: 0.2s;
        }
        .editable-table td input:focus, .editable-table td textarea:focus {
            border-color: #2e86c1;
            background: white;
            outline: none;
            box-shadow: 0 0 0 2px rgba(46,134,193,0.2);
        }
        .editable-table td input[type="number"] { text-align: center; }

        /* AI Upload Area */
        .upload-zone {
            border: 3px dashed #ccc;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #2e86c1; background: #f0f8ff; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: #2e86c1; width: 0%; transition: width 0.3s; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            z-index: 300;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    </style>
</head>
<body>

    <!-- Header with editable logo and name -->
    <header class="app-header" id="appHeader">
        <div class="header-left">
            <img id="schoolLogo" src="https://via.placeholder.com/50?text=Logo" alt="Logo" style="cursor:pointer;" 
                 onclick="window.app.editLogo()">
            <div class="header-info">
                <h2 id="schoolNameDisplay" onclick="window.app.editSchoolName()" style="cursor:pointer;">لیسه عالی معرفت افغان</h2>
                <p id="schoolSubDisplay" onclick="window.app.editSchoolDetails()" style="cursor:pointer;">وزارت معارف | سال تعلیمی ۱۴۰۴</p>
            </div>
        </div>
        <div>
            <button class="btn" onclick="window.app.exportExcel()">💾 دانلود اکسیل</button>
            <button class="btn btn-primary" onclick="window.app.loadFromGitHub()">🔄 بارگیری از GitHub</button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">📁 باز کردن فایل</button>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="window.app.loadLocalExcel(event)">
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs-container" id="tabsContainer"></div>

    <!-- Panels container -->
    <div id="panelsContainer"></div>

    <!-- AI Correction Modal -->
    <div class="modal" id="aiModal">
        <div class="modal-content">
            <h3>اصلاح اطلاعات تشخیص داده شده</h3>
            <div id="aiCorrectionForm"></div>
            <div style="margin-top:15px; display:flex; gap:10px; justify-content:flex-end;">
                <button class="btn" onclick="document.getElementById('aiModal').classList.remove('show')">انصراف</button>
                <button class="btn btn-primary" onclick="window.app.saveAICorrection()">ذخیره</button>
            </div>
        </div>
    </div>

    <script>
        // ======================== MAIN APP ========================
        class SchoolExcelApp {
            constructor() {
                this.workbook = null;
                this.sheetNames = [];
                this.activeSheet = '';

                // Editable metadata
                this.logoUrl = localStorage.getItem('logoUrl') || 'https://via.placeholder.com/50?text=Logo';
                this.schoolName = localStorage.getItem('schoolName') || 'لیسه عالی معرفت افغان';
                this.schoolSubtitle = localStorage.getItem('schoolSubtitle') || 'وزارت معارف | سال تعلیمی ۱۴۰۴';

                // AI last result
                this.lastAIResult = null;
                this.lastAIImage = null;

                this.init();
            }

            init() {
                this.updateHeaderDisplay();
                // Load saved workbook if exists
                const saved = localStorage.getItem('workbookBase64');
                if (saved) {
                    const wb = XLSX.read(saved, { type: 'base64' });
                    this.loadWorkbook(wb);
                } else {
                    // Auto fetch from GitHub
                    this.loadFromGitHub();
                }
            }

            async loadFromGitHub() {
                try {
                    const res = await fetch('./هفتم%20با%20.xlsx');
                    if (!res.ok) throw new Error('File not found');
                    const buffer = await res.arrayBuffer();
                    const wb = XLSX.read(buffer, { type: 'array' });
                    this.loadWorkbook(wb);
                } catch (e) {
                    console.warn('GitHub load failed', e);
                }
            }

            loadLocalExcel(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const wb = XLSX.read(ev.target.result, { type: 'array' });
                    this.loadWorkbook(wb);
                };
                reader.readAsArrayBuffer(file);
            }

            loadWorkbook(wb) {
                this.workbook = wb;
                this.sheetNames = wb.SheetNames;
                this.activeSheet = this.sheetNames[0] || '';
                this.saveWorkbookToStorage();
                this.render();
            }

            saveWorkbookToStorage() {
                if (!this.workbook) return;
                const wbout = XLSX.write(this.workbook, { bookType: 'xlsx', type: 'base64' });
                localStorage.setItem('workbookBase64', wbout);
            }

            render() {
                this.renderTabs();
                this.renderPanels();
            }

            renderTabs() {
                const container = document.getElementById('tabsContainer');
                container.innerHTML = '';
                this.sheetNames.forEach(name => {
                    const tab = document.createElement('button');
                    tab.className = `tab ${name === this.activeSheet ? 'active' : ''}`;
                    tab.textContent = name;
                    tab.onclick = () => this.switchSheet(name);
                    container.appendChild(tab);
                });
                // Extra tab for AI upload
                const aiTab = document.createElement('button');
                aiTab.className = `tab ${this.activeSheet === '__aiUpload__' ? 'active' : ''}`;
                aiTab.textContent = '📸 AI شقه';
                aiTab.onclick = () => this.switchSheet('__aiUpload__');
                container.appendChild(aiTab);
            }

            switchSheet(name) {
                this.activeSheet = name;
                this.renderTabs();
                this.renderPanels();
            }

            renderPanels() {
                const container = document.getElementById('panelsContainer');
                container.innerHTML = '';

                if (this.activeSheet === '__aiUpload__') {
                    container.innerHTML = this.renderAIUploadPanel();
                    return;
                }

                if (!this.workbook || !this.sheetNames.includes(this.activeSheet)) return;

                const sheet = this.workbook.Sheets[this.activeSheet];
                const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false });

                const panel = document.createElement('div');
                panel.className = 'panel active';
                panel.innerHTML = `<div class="table-wrapper" style="overflow-x:auto;">
                    <table class="editable-table" id="editableTable"></table>
                </div>`;
                container.appendChild(panel);

                const table = document.getElementById('editableTable');
                // Build table from data
                data.forEach((row, rowIdx) => {
                    const tr = document.createElement('tr');
                    row.forEach((cellValue, colIdx) => {
                        const cellRef = XLSX.utils.encode_cell({ r: rowIdx, c: colIdx });
                        const td = document.createElement('td');
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = cellValue !== undefined ? cellValue : '';
                        input.dataset.sheet = this.activeSheet;
                        input.dataset.cell = cellRef;
                        input.addEventListener('change', (e) => this.onCellChange(e.target));
                        td.appendChild(input);
                        tr.appendChild(td);
                    });
                    table.appendChild(tr);
                });
            }

            onCellChange(input) {
                const sheetName = input.dataset.sheet;
                const cellRef = input.dataset.cell;
                const value = input.value;
                if (!this.workbook || !sheetName) return;
                const sheet = this.workbook.Sheets[sheetName];
                if (!sheet) return;
                // Update cell
                if (!isNaN(value) && value.trim() !== '') {
                    sheet[cellRef] = { t: 'n', v: parseFloat(value) };
                } else {
                    sheet[cellRef] = { t: 's', v: value };
                }
                this.saveWorkbookToStorage();
            }

            // ========== Export ==========
            exportExcel() {
                if (!this.workbook) return;
                XLSX.writeFile(this.workbook, 'هفتم_با_ویرایش.xlsx');
            }

            // ========== Header editing ==========
            editLogo() {
                const newUrl = prompt('آدرس عکس لوگو را وارد کنید:', this.logoUrl);
                if (newUrl) {
                    this.logoUrl = newUrl;
                    localStorage.setItem('logoUrl', newUrl);
                    document.getElementById('schoolLogo').src = newUrl;
                }
            }
            editSchoolName() {
                const newName = prompt('نام مکتب:', this.schoolName);
                if (newName) {
                    this.schoolName = newName;
                    localStorage.setItem('schoolName', newName);
                    document.getElementById('schoolNameDisplay').textContent = newName;
                }
            }
            editSchoolDetails() {
                const newSub = prompt('زیرعنوان (ریاست، سال و...):', this.schoolSubtitle);
                if (newSub) {
                    this.schoolSubtitle = newSub;
                    localStorage.setItem('schoolSubtitle', newSub);
                    document.getElementById('schoolSubDisplay').textContent = newSub;
                }
            }
            updateHeaderDisplay() {
                document.getElementById('schoolLogo').src = this.logoUrl;
                document.getElementById('schoolNameDisplay').textContent = this.schoolName;
                document.getElementById('schoolSubDisplay').textContent = this.schoolSubtitle;
            }

            // ===================== AI UPLOAD =====================
            renderAIUploadPanel() {
                return `
                <div class="panel active">
                    <h2>📸 آپلود عکس شقه و تشخیص با AI</h2>
                    <div class="upload-zone" id="aiDropZone">
                        <p>عکس شقه را اینجا بکشید یا کلیک کنید</p>
                        <input type="file" id="aiFileInput" accept="image/*" style="display:none">
                    </div>
                    <div id="aiProgress" style="display:none; text-align:center; margin:20px;">
                        <div class="progress-bar"><div class="progress-fill" id="aiProgressFill"></div></div>
                        <p id="aiProgressText">در حال پردازش...</p>
                    </div>
                    <div id="aiResult" style="display:none;"></div>
                </div>`;
            }

            setupAIListeners() {
                const dropZone = document.getElementById('aiDropZone');
                const fileInput = document.getElementById('aiFileInput');
                if (!dropZone) return;
                dropZone.onclick = () => fileInput.click();
                dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
                dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
                dropZone.addEventListener('drop', e => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    const files = e.dataTransfer.files;
                    if (files.length) this.processAIImage(files[0]);
                });
                fileInput.onchange = (e) => {
                    if (e.target.files.length) this.processAIImage(e.target.files[0]);
                };
            }

            async processAIImage(file) {
                document.getElementById('aiDropZone').style.display = 'none';
                document.getElementById('aiProgress').style.display = 'block';
                const progressFill = document.getElementById('aiProgressFill');
                const progressText = document.getElementById('aiProgressText');

                // Simulate progress for Tesseract
                progressFill.style.width = '30%';
                progressText.textContent = 'در حال خواندن متن...';

                try {
                    const worker = await Tesseract.createWorker('fas+ara');
                    const { data } = await worker.recognize(file);
                    await worker.terminate();
                    progressFill.style.width = '100%';
                    progressText.textContent = 'پایان پردازش';

                    this.lastAIImage = URL.createObjectURL(file);
                    this.lastAIResult = this.parseScoresFromText(data.text);

                    this.showAICorrectionModal();
                } catch (err) {
                    progressText.textContent = 'خطا در پردازش، لطفاً دوباره تلاش کنید';
                }
            }

            parseScoresFromText(text) {
                // Simple parser: look for student name and numbers
                const lines = text.split('\n').map(l => l.trim()).filter(l => l);
                const nameMatch = text.match(/(?:نام|اسم)\s*:?\s*(.+)/);
                const studentName = nameMatch ? nameMatch[1].trim() : '';

                // Scores: try to map known subjects by order
                const scoreRegex = /(\d{1,3})\s*\/\s*(\d{2})/g;
                const scores = {};
                let match;
                let idx = 1;
                while ((match = scoreRegex.exec(text)) !== null && idx <= 20) {
                    scores[idx] = parseInt(match[1]);
                    idx++;
                }

                return { studentName, scores };
            }

            showAICorrectionModal() {
                const form = document.getElementById('aiCorrectionForm');
                const subjects = ['قرآنکریم','دنیات','دری','پشتو','تجوید','عربي','انگلیسي','ریاضي','فزیک','کیمیا','بیولوژي','ساینس','اجتماعیات','جغرافیه','مدني','حسن خط','حرفه','مهارت زندگی','تربیت بدنی','تهذیب'];
                form.innerHTML = `
                    <div style="margin-bottom:15px;">
                        <img src="${this.lastAIImage}" style="max-width:100%; max-height:200px; border-radius:8px;">
                    </div>
                    <label>نام شاگرد:</label>
                    <input type="text" id="aiStudentName" value="${this.lastAIResult.studentName}" style="width:100%; padding:8px; margin-bottom:10px;">
                    <h4>نمرات تشخیص داده شده (اصلاح کنید):</h4>
                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;">
                        ${subjects.slice(0,15).map((sub, i) => `
                            <div>
                                <label>${sub}</label>
                                <input type="number" id="aiScore${i+1}" value="${this.lastAIResult.scores[i+1] || ''}" min="0" max="40" style="width:100%;">
                            </div>
                        `).join('')}
                    </div>
                `;
                document.getElementById('aiModal').classList.add('show');
            }

            saveAICorrection() {
                const name = document.getElementById('aiStudentName').value.trim();
                if (!name) return alert('لطفاً نام شاگرد را وارد کنید');
                const scores = {};
                for (let i = 1; i <= 15; i++) {
                    const val = document.getElementById(`aiScore${i}`).value;
                    if (val !== '') scores[i] = parseInt(val);
                }

                // Find or create student in the main sheet (assume first sheet is student list)
                if (!this.workbook) return;
                const mainSheetName = this.sheetNames[0] || 'Sheet1';
                const sheet = this.workbook.Sheets[mainSheetName];
                if (!sheet) return;

                // Convert sheet to array to find row
                const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                let rowIndex = -1;
                // Find row with this name
                for (let r = 1; r < data.length; r++) {
                    if (data[r][1] && String(data[r][1]).trim() === name) {
                        rowIndex = r;
                        break;
                    }
                }
                // If not found, add new row at the end
                if (rowIndex === -1) {
                    rowIndex = data.length;
                    // Add empty row
                    const emptyRow = Array(data[0].length).fill('');
                    data.push(emptyRow);
                    // Set name in column 1 (index 1)
                    sheet[XLSX.utils.encode_cell({ r: rowIndex, c: 1 })] = { t: 's', v: name };
                }

                // Write scores to columns 5+ (subject columns)
                for (let i = 1; i <= 15; i++) {
                    if (scores[i] !== undefined) {
                        const cellRef = XLSX.utils.encode_cell({ r: rowIndex, c: 4 + i }); // column 5 onwards
                        sheet[cellRef] = { t: 'n', v: scores[i] };
                    }
                }

                // Update the sheet data range
                sheet['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: data.length - 1, c: data[0].length - 1 } });

                this.saveWorkbookToStorage();
                document.getElementById('aiModal').classList.remove('show');
                alert('✅ نمرات ذخیره شد');
                // Refresh current panel if it's the AI panel or the main sheet
                if (this.activeSheet === '__aiUpload__') {
                    this.renderPanels();
                }
            }
        }

        // ========== BOOT ==========
        window.app = new SchoolExcelApp();
        // We must setup AI listeners after render because panel may be recreated
        const observer = new MutationObserver(() => {
            if (document.getElementById('aiDropZone')) {
                window.app.setupAIListeners();
            }
        });
        observer.observe(document.getElementById('panelsContainer'), { childList: true, subtree: true });
    </script>
</body>
</html>
