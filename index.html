<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم مدیریت شقق - صنف هفتم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            direction: rtl;
        }

        .app-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation */
        .top-nav {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand h1 {
            color: #2d3748;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .school-name {
            color: #718096;
            font-size: 14px;
        }

        .nav-actions {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .nav-btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #2d3748;
            display: block;
        }

        .stat-label {
            font-size: 16px;
            color: #718096;
            margin-top: 5px;
        }

        .top-performers {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .top-performers h3 {
            margin-bottom: 20px;
            color: #2d3748;
        }

        .top-student-card {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            gap: 15px;
        }

        .rank {
            font-weight: bold;
            color: #667eea;
            font-size: 18px;
            min-width: 30px;
        }

        .name {
            flex: 1;
            font-weight: 500;
        }

        .average {
            font-weight: bold;
            color: #48bb78;
        }

        .grade {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .grade-الف {
            background: #fef3c7;
            color: #d97706;
        }

        .grade-ب {
            background: #dbeafe;
            color: #2563eb;
        }

        .grade-ج {
            background: #d1fae5;
            color: #059669;
        }

        .grade-د {
            background: #fef3c7;
            color: #d97706;
        }

        /* Upload Section */
        .upload-zone {
            background: white;
            border: 3px dashed #cbd5e0;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .upload-zone:hover,
        .upload-zone.drag-active {
            border-color: #667eea;
            background: #f7fafc;
        }

        .upload-icon {
            font-size: 60px;
            display: block;
            margin-bottom: 20px;
        }

        .upload-content h3 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .upload-content p {
            color: #718096;
            margin-bottom: 25px;
        }

        .upload-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* Buttons */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-info {
            background: #4299e1;
            color: white;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-sm {
            padding: 6px 15px;
            font-size: 12px;
        }

        /* Camera */
        .camera-view {
            background: black;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .camera-view video {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }

        .camera-controls {
            padding: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            background: rgba(0,0,0,0.8);
        }

        /* Processing */
        .processing-status {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-container {
            max-width: 500px;
            margin: 0 auto;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #718096;
            font-size: 14px;
        }

        /* Results */
        .results-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .results-actions {
            display: flex;
            gap: 10px;
        }

        .sheet-card {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .sheet-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .sheet-card.needs-review {
            border-left: 4px solid #ed8936;
        }

        .sheet-card.has-error {
            background: #fed7d7;
            border-color: #f56565;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-warning {
            background: #fef3c7;
            color: #975a16;
        }

        .badge-danger {
            background: #fed7d7;
            color: #9b2c2c;
        }

        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .score-item {
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 13px;
            border: 1px solid #e2e8f0;
        }

        .sheet-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-container {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }

        .modal-controls {
            display: flex;
            gap: 10px;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            position: sticky;
            bottom: 0;
            background: white;
        }

        /* Editor Form */
        .form-section {
            margin-bottom: 25px;
        }

        .form-section h4 {
            color: #2d3748;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .subject-entry {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .subject-entry label {
            font-size: 12px;
            color: #718096;
        }

        .subject-entry input {
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 13px;
        }

        .matched-student {
            background: #f0fff4;
            border: 1px solid #48bb78;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        /* Students Table */
        .students-view {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .students-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-box input {
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            min-width: 250px;
            font-family: inherit;
        }

        .filter-buttons {
            display: flex;
            gap: 5px;
        }

        .filter-btn {
            padding: 8px 15px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #f7fafc;
            padding: 12px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .data-table tr:hover {
            background: #f7fafc;
        }

        .absent-row {
            background: #fed7d7;
        }

        .result {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .result.success {
            background: #c6f6d5;
            color: #22543d;
        }

        .result.warning {
            background: #fef3c7;
            color: #975a16;
        }

        .result.danger {
            background: #fed7d7;
            color: #9b2c2c;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .notification-success {
            background: #48bb78;
        }

        .notification-error {
            background: #f56565;
        }

        .notification-warning {
            background: #ed8936;
        }

        .notification.fade-out {
            opacity: 0;
            transition: opacity 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translate(-50%, -100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-nav {
                flex-direction: column;
                gap: 15px;
            }
            
            .nav-actions {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .subjects-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            
            .upload-zone {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div style="text-align: center; padding: 100px 20px; color: white;">
            <h1>📚 در حال بارگذاری...</h1>
            <p>سیستم مدیریت شقق</p>
        </div>
    </div>

    <script type="module" src="database.js"></script>
    <script type="module" src="ai-processor.js"></script>
    <script type="module" src="exporter.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
